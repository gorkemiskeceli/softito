!DOCTYPE html>
<html lang="tr">

<head>
    <style>
        .container {
            display: flex;
            gap: 100px;
            flex-direction: column;
        }

        .container1 {
            background-color: red;
            width: 100%;
            height: 500px;
        }

        .container2 {

            width: 100%;
            height: 500px;
            display: flex;
        }

        .container3 {
            background-color: blue;
            width: 100%;
            height: 500px;
        }

        .container2-1 {
            background-color: yellow;
            width: 10%;
        }

        .container2-2 {
            width: 80%;
            background-color: orange;
        }

        .container2-3 {
            background-color: purple;
            width: 10%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container1">1</div>
        <div class="container2">
            <div class="container2-1"></div>
            <div class="container2-2"></div>
            <div class="container2-3"></div>
        </div>
        <div class="container3">1</div>
    </div>

</body>

</html>
