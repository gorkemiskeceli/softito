<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <title>Hesap Makinesi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #111827;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 18px;
            box-sizing: border-box;
        }

        .divButton {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3730a3;
        }

        .result {
            margin-top: 10px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #111827;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Hesap Makinesi</h1>
        <input type="number" id="sayi1" placeholder="1. sayıyı giriniz">
        <input type="number" id="sayi2" placeholder="2. sayıyı giriniz">

        <div class="divButton">
            <button onclick="topla()">Topla</button>
            <button onclick="cikar()">Çıkar</button>
            <button onclick="carp()">Çarp</button>
            <button onclick="bol()">Böl</button>
        </div>
        <div class="result" id="sonuc">
            Sonuç burada görünecek
        </div>
    </div>
    <script>
        function getValues() {
            let sayi1 = Number(document.getElementById("sayi1").value);
            let sayi2 = Number(document.getElementById("sayi2").value);
            return { sayi1, sayi2 };
        }
        function yazdir(sonuc) {
            document.getElementById("sonuc").innerHTML = "Sonuç :" + sonuc;
        }
        function topla() {
            let { sayi1, sayi2 } = getValues();
            yazdir(sayi1 + sayi2);
        }
        function cikar() {
            let { sayi1, sayi2 } = getValues();
            yazdir(sayi1 - sayi2);
        }
        function carp() {
            let { sayi1, sayi2 } = getValues();
            yazdir(sayi1 * sayi2);
        }
        function bol() {
            let { sayi1, sayi2 } = getValues();
            yazdir(sayi1 / sayi2);
        }
    </script>
</body>

</html>
