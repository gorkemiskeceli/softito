<!DOCTYPE html>
<html lang="tr">

<head>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            width: 100px;
            height: 50px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: yellow;
            color: black;

        }
    </style>
</head>

<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <button>Button</button>
</body>

</html>
