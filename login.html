<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h1>Kullanıcı girisi</h1>
        <form>
            <label>Email:</label>
            <input type="email" placeholder="email adresinizi giriniz" required>
            <br><br>
            <label>sifre:</label>
            <input type="password" placeholder="şifrenizi giriniz" required>
            <br><br>
            <label>Doğum tarihi</label>
            <input type="date">         
            <br><br>
            <label>telefon numarası:</label>
            <input type="tel" placeholder="telefon numaranızı giriniz">
            <br><br>
            <label>CV</label>
            <input type="file" accept=".pdf, .doc, .docx">
            <br><br>
            <input type="checkbox">
            <label>Beni Hatırla</label>
            <br><br>
            <button type="submit">Gönder</button>
        </form>
    </main>
</body>
</html>
