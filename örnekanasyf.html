<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>STREAMIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #141414;
            color: white;
        }

        nav {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(10px);
        }

        .logo {
            color: #e50914;
            font-size: 32px;
            font-weight: bold;
            ;
        }

        .menu {
            display: flex;
            gap: 30px;
        }

        .menu a {
            font-size: 18px;
            color: white;
            text-decoration: none;
            transition: .3s;
        }

        .menu a:hover {
            color: #e50914
        }

        .hero {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, .3), rgba(0, 0, 0, .9)),
                url("https://images.unsplash.com/photo-1536440136628-849c177e76a1");
            bockground-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 70px;
        }

        .hero-content {
            width: 600px;
        }

        .hero-content h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .hero-content p {
            color: #ddd;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .watch-button {
            background: #e50914;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            transition: .3s;
        }

        .watch-button:hover {
            transform: scale(1.08);
        }

        .section {
            padding: 50px;
        }

        .section h2 {
            margin-bottom: 20px;
        }

        .movies {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: 220px;
            height: 320px;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: .4s;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card:hover {
            transform: scale(1.08);
        }

        .card-title {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, black);
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">STREAMIX</div>
        <div class="menu">
            <a href="">Ana Sayfa</a>
            <a href="">Filmler</a>
            <a href="">Diziler</a>
            <a href="">Favoriler</a>
        </div>
    </nav>
    <section class="hero">
        <div class="hero-content">

            <h1>THE LST WORLD</h1>
            <p>Dünyanın son günlerinnde geçen aksiyon dolu bir macera..
                şimdi keşfet.
            </p>
            <button class="watch-button">İzlemeye Başla</button>
        </div>
    </section>
    <section class="section">
        <h2>Popüler İçerik</h2>
        <div class="movies">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c" alt="Movie 1">
                <div class="card-title">
                    <h3>Film 1</h3>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba" alt="Movie 2">
                <div class="card-title">
                    <h3>Film 2</h3>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1535016120720-40c646be5580" alt="Movie 3">
                <div class="card-title">
                    <h3>Film 3</h3>
                </div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26" alt="Movie 4">
                <div class="card-title">
                    <h3>Film 4</h3>
                </div>
            </div>
    </section>

</body>

</html>​
