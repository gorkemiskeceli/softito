<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: "border-box";
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, .75), rgba(0, 0, 0, .75)),
                url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            position: absolute;
            top: 25px;
            left: 40px;
            font-size: 38px;
            font-weight: bold;
            color: #e50914;
            letter-spacing: 2px;
        }

        .login-box {
            width: 420px;
            padding: 60px 50px;
            background: rgba(0, 0, 0, .80);
            border-radius: 8px;
            color: white;
        }

        .login-box h1 {
            margin-bottom: 30px;
            font-size: 32px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background: #333;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border: 1px solid white;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 4px;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .login-btn:hover {
            background: #f40612;
        }

        .options {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b3b3b3;
        }

        .signup a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="logo">STREAMIX</div>
    <div class="login-box">
        <h1>Oturum Aç</h1>
        <form>
            <div class="input-group">
                <input type="email" placeholder="E-posta veya telefon numaranızı giriniz">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Şifrenizi giriniz">
            </div>
            <div class="input-group">
                <button type="submit" class="login-btn">Giriş Yap</button>
            </div>
        </form>
        <div class="options">
            <span>beni hatırla</span>
            <span>yardım mı lazım?</span>
        </div>
        <div class="signup">
            yeni misin? <a href=""> hemen kayıt ol</a>
        </div>
    </div>
</body>

</html>
