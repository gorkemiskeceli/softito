​<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopZone - E-Ticaret</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f1f5f9;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #0f172a;
      color: white;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #f97316;
    }

    .menu a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #f97316;
    }

    .cart {
      background: #f97316;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
    }

    /* HERO */
    .hero {
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;

      background-image: url("https://images.unsplash.com/photo-1523275335684-37898b6baf30");
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      color: white;
    }

    .hero h1 {
      font-size: 42px;
    }

    .hero p {
      margin: 10px 0;
    }

    .hero button {
      padding: 10px 20px;
      border: none;
      background: #f97316;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero button:hover {
      background: #ea580c;
    }

    /* PRODUCTS */
    .products {
      padding: 40px;
      text-align: center;
    }

    .products h2 {
      margin-bottom: 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card h3 {
      margin: 10px 0;
    }

    .product-card p {
      font-weight: bold;
    }

    .product-card button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #0f172a;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .product-card button:hover {
      background: #f97316;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #0f172a;
      color: white;
      margin-top: 40px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 10px;
      }

      .hero h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">ShopZone</div>

    <nav class="menu">
      <a href="#">Ana Sayfa</a>
      <a href="#">Ürünler</a>
      <a href="#">Kampanyalar</a>
      <a href="#">İletişim</a>
    </nav>

    <div class="cart">🛒 Sepet (0)</div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Yeni Sezon Ürünleri</h1>
      <p>En iyi fiyatlarla alışveriş yap</p>
      <button>Alışverişe Başla</button>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="products">
    <h2>Popüler Ürünler</h2>

    <div class="product-grid">

      <div class="product-card">
        <img src="https://picsum.photos/300/200" />
        <h3>Akıllı Saat</h3>
        <p>₺1.999</p>
        <button>Sepete Ekle</button>
      </div>

      <div class="product-card">
        <img src="https://picsum.photos/301/200" />
        <h3>Kulaklık</h3>
        <p>₺899</p>
        <button>Sepete Ekle</button>
      </div>

      <div class="product-card">
        <img src="https://picsum.photos/302/200" />
        <h3>Gaming Mouse</h3>
        <p>₺499</p>
        <button>Sepete Ekle</button>
      </div>

      <div class="product-card">
        <img src="https://picsum.photos/303/200" />
        <h3>Laptop Çantası</h3>
        <p>₺299</p>
        <button>Sepete Ekle</button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 ShopZone - Tüm Hakları Saklıdır
  </footer>

</body>
</html>
