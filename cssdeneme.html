<html lang="tr">

<head>

            color: red;

        }

        }

        .renkli {
            color: green;
        }

        }

        a {
            text-decoration: none;

        div {
            position: relative;
            background-color: yellowgreen;

            height: 100px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 5px;
            margin: 10px;
            left: 10px;
            right: 10px;
        }
    </style>
</head>

<body>

    <p>Bu bir paragraf.</p>

    <div>
        Kutu
    </div>
    <div>
        kutu2

</html>
